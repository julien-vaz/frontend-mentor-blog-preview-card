<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css">
  
  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>
  <main class="page">

    <article class="card">

      <figure class="card-image-container">
        <img class="card-image" src="./assets/images/illustration-article.svg" alt="Modern illustration in yellow, black and white">
      </figure>

      <section class="blog-preview">
        <span class="category">Learning</span>
        <p class="publish-info">Published 21 Dec 2023</p>
        <h1 class="blog-title">HTML & CSS foundations</h1>
        <p class="blog-short-description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </section>

      <figure class="author">
        <img class="author-avatar" src="./assets/images/image-avatar.webp" alt="Greg Hooper's avatar image">
        <span class="author-name">Greg Hooper</span>
      </figure>

    </article>
  </main> 
</body>
</html>
